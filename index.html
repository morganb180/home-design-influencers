.header {

.card:active {

.card-top {

.note {

  line-height: 1.45;

.niche-tag {

    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function render() {
    var filtered = [];
    for (var i = 0; i < DATA.length; i++) {
      var item = DATA[i];
      if (activeTier !== "all" && item.tier !== activeTier) continue;
      if (sunbeltOnly && item.sunbelt !== "Y") continue;
      if (searchTerm) {
        var q = searchTerm.toLowerCase();
        var hay = (item.handle + ' ' + item.location + ' ' + item.niche + ' ' + item.note + ' ' + item.contact).toLowerCase();
        if (hay.indexOf(q) === -1) continue;
      }
      filtered.push(item);
    }

    var tierOrder = ["1. MEGA (1M+)", "2. LARGE (300K-1M)", "3. MID (100K-300K)", "4. RISING (<100K)"];

    if (sortAlpha) {
      filtered.sort(function(a, b) { return a.handle.localeCompare(b.handle); });
    } else {
      filtered.sort(function(a, b) {
        var ta = tierOrder.indexOf(a.tier);
        var tb = tierOrder.indexOf(b.tier);
        if (ta !== tb) return ta - tb;
        return parseFollowers(b.followers) - parseFollowers(a.followers);
      });
    }

    countEl.textContent = filtered.length + ' shown';

    if (filtered.length === 0) {
      cardsEl.innerHTML = '<div class="empty">No influencers match your filters.</div>';
      return;
    }

    var html = '';
    var lastTier = '';
    for (var j = 0; j < filtered.length; j++) {
      var item = filtered[j];
      if (!sortAlpha && item.tier !== lastTier) {
        html += '<div class="tier-label">' + (tierShort[item.tier] || item.tier) + '</div>';
        lastTier = item.tier;
      }
      var tc = tierClass[item.tier] || 't4';
      var ts = tierShort[item.tier] || item.tier;
      var sb = item.sunbelt === 'Y' ? '<span class="sunbelt-tag">&#127774; Sunbelt</span>' : '';
      var contactLine = item.contact ? '<div style="font-size:11px;color:var(--text-dim);margin-top:3px;">&#128231; ' + escapeHtml(item.contact) + '</div>' : '';
      var verifiedLine = item.verified ? '<span class="meta-item">&#10003; ' + escapeHtml(item.verified) + '</span>' : '';
      html += '<a class="card" href="' + escapeHtml(item.url) + '" target="_blank" rel="noopener">' +
        '<div class="card-top"><span class="handle">' + escapeHtml(item.handle) + '</span>' +
        '<span class="tier-badge ' + tc + '">' + ts + '</span></div>' +
        '<div class="card-meta">' +
        '<span class="meta-item">&#128101; ' + escapeHtml(item.followers) + '</span>' +
        '<span class="meta-item">&#128205; ' + escapeHtml(item.location) + '</span>' +
        verifiedLine + sb +
        '</div>';
      if (item.niche) html += '<span class="niche-tag">' + escapeHtml(item.niche) + '</span>';
      if (item.note) html += '<div class="note">' + escapeHtml(item.note) + '</div>';
      html += contactLine + '</a>';
    }
    cardsEl.innerHTML = html;
  }

  document.getElementById('search').addEventListener('input', function(e) {
    searchTerm = e.target.value.trim();
    render();
  });

  var chips = document.querySelectorAll('.chip');
  for (var c = 0; c < chips.length; c++) {
    chips[c].addEventListener('click', function() {
      for (var d = 0; d < chips.length; d++) chips[d].classList.remove('active');
      this.classList.add('active');
      activeTier = this.getAttribute('data-tier');
      render();
    });
  }

  document.getElementById('sunbelt-only').addEventListener('change', function(e) {
    sunbeltOnly = e.target.checked;
    render();
  });
  document.getElementById('sort-alpha').addEventListener('change', function(e) {
    sortAlpha = e.target.checked;
    render();
  });

  render();
})();
</script>
</body>
</html>
